name: Semantic SQL Risk Check

on:
  pull_request:
    paths:
      - 'models/**/*.sql'

jobs:
  semantic-risk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      DBT_SNOWFLAKE_ACCOUNT:   ${{ secrets.DBT_SNOWFLAKE_ACCOUNT }}
      DBT_SNOWFLAKE_USER:      ${{ secrets.DBT_SNOWFLAKE_USER }}
      DBT_SNOWFLAKE_PASSWORD:  ${{ secrets.DBT_SNOWFLAKE_PASSWORD }}
      DBT_SNOWFLAKE_ROLE:      ${{ secrets.DBT_SNOWFLAKE_ROLE }}
      DBT_SNOWFLAKE_DATABASE:  ${{ secrets.DBT_SNOWFLAKE_DATABASE }}
      DBT_SNOWFLAKE_WAREHOUSE: ${{ secrets.DBT_SNOWFLAKE_WAREHOUSE }}
      DBT_SNOWFLAKE_SCHEMA:    ${{ secrets.DBT_SNOWFLAKE_SCHEMA }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake --quiet

      - name: Install dbt packages
        run: dbt deps

      - name: Semantic SQL Risk Check
        uses: badaadata/semantic-risk-engine-action@v1
        with:
          api_key:          ${{ secrets.SEMANTIC_RISK_API_KEY }}
          dialect:          snowflake
          dbt_profiles_dir: .
          dbt_target:       dev
          api_base_url:     https://broadcast-chatty-moonrise.ngrok-free.dev
